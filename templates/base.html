<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Migration Atlas{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body class="{{ body_class | default('') }}">
    <header class="site-shell">
      <nav class="site-nav">
        <a class="site-brand" href="{{ url_for('home') }}">
          <span class="brand-mark"></span>
          <span class="brand-copy">
            <strong>Migration Atlas</strong>
            <small>Information Visualization Project</small>
          </span>
        </a>
        <div class="nav-links">
          {% for item in nav_views %}
            <a href="{{ url_for(item.endpoint) }}">{{ item.label }}</a>
          {% endfor %}
        </div>
      </nav>
    </header>

    <main class="site-shell">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
